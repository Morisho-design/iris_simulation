<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仏壇シミュレーター</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="app">

  <!-- 表示 -->
  <div class="viewer">
    <div class="stage">

      <img id="wall" class="layer wall" src="walls/walls_ivory.png">
      <img id="floor" class="layer floor" src="floors/floors_natural.png">
      <img id="furniture" class="layer furniture hidden">
      <img id="butsudan" class="layer butsudan" src="butsudan/iris1300.png">

    </div>
  </div>

  <!-- UI -->
  <div class="panel">

    <h3>壁</h3>
    <div id="wallButtons"></div>

    <h3>床</h3>
    <div id="floorButtons"></div>

    <h3>家具</h3>
    <button id="toggleFurniture">表示</button>
    <div id="furnitureButtons"></div>

    <h3>仏壇</h3>
    <div id="butsudanButtons"></div>

  </div>

</div>

<script src="./script.js"></script>
</body>
</html>
