<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アイリス合成シミュレーター</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>アイリス合成シミュレーター</h1>
      <p class="lead">
        サムネイルをクリックして、壁・床・家具・仏壇を切り替えできます。
      </p>

      <section class="section">
        <div class="section-head">
          <h2>壁</h2>
        </div>
        <div id="wallButtons" class="thumb-grid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>床</h2>
        </div>
        <div id="floorButtons" class="thumb-grid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>家具</h2>
          <button id="toggleFurnitureBtn" type="button" class="mini-btn">家具 OFF</button>
        </div>
        <div id="furnitureButtons" class="thumb-grid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>仏壇</h2>
        </div>
        <div id="butsudanButtons" class="thumb-grid"></div>
      </section>

      <section class="section info-box">
        <h2>選択中の仏壇</h2>
        <p id="currentButsudanName">iris1300tamo</p>
      </section>
    </aside>

    <main class="viewer">
      <div class="stage">
        <img id="wall" src="walls/walls_ivory.png" class="layer wall" alt="壁" />
        <img id="floor" src="floors/floors_natural.png" class="layer floor" alt="床" />
        <img id="furniture" src="" class="layer furniture" alt="家具" style="display:none;" />
        <img id="butsudan" src="butsudan/iris1300tamo.png" class="butsudan" alt="仏壇" />
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
